params:
  logA:
    prior:
      min: 2.5
      max: 3.5
    ref:
      dist: norm
      loc: 3.044
      scale: 0.014
    proposal: 0.01
    drop: true
    latex: \log(10^{10} A_s)
  A_s:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    latex: A_s
    derived: true
    renames:
    - As
  n_s:
    prior:
      min: 0.9
      max: 1.05
    ref:
      dist: norm
      loc: 0.965
      scale: 0.004
    proposal: 0.004
    latex: n_s
    renames:
    - ns
  H0:
    prior:
      min: 50
      max: 90
    ref:
      dist: norm
      loc: 67.4
      scale: 0.5
    proposal: 0.5
    latex: H_0
  omega_b:
    prior:
      min: 0.018
      max: 0.026
    ref:
      dist: norm
      loc: 0.02237
      scale: 0.0002
    proposal: 0.0002
    latex: \omega_b
    renames:
    - omegabh2
  omega_cdm:
    prior:
      min: 0.1
      max: 0.14
    ref:
      dist: norm
      loc: 0.12
      scale: 0.001
    proposal: 0.001
    latex: \omega_{cdm}
    renames:
    - omegach2
  tau_reio:
    prior:
      min: 0.01
      max: 0.15
    ref:
      dist: norm
      loc: 0.0544
      scale: 0.007
    proposal: 0.005
    latex: \tau_{reio}
    renames:
    - tau
  A_planck:
    prior:
      dist: norm
      loc: 1.0
      scale: 0.0025
    ref:
      dist: norm
      loc: 1.0
      scale: 0.002
    proposal: 0.002
    latex: A_{planck}
    renames: calPlanck
  epsilon_T:
    prior:
      min: 0.0
      max: 0.02
    ref:
      dist: norm
      loc: 0.002
      scale: 0.002
    proposal: 0.0007
    latex: \epsilon_T
  chi2__BAO:
    latex: \chi^2_\mathrm{BAO}
    derived: true
  chi2__CMB:
    latex: \chi^2_\mathrm{CMB}
    derived: true
  chi2__SN:
    latex: \chi^2_\mathrm{SN}
    derived: true
sampler:
  mcmc:
    sampler_type: mcmc
    supports_periodic_params: true
    burn_in: 0
    max_tries: 40d
    covmat: null
    covmat_params: null
    proposal_scale: 2.4
    output_every: 60s
    learn_every: 40d
    temperature: 1
    learn_proposal: true
    learn_proposal_Rminus1_max: 2.0
    learn_proposal_Rminus1_max_early: 30.0
    learn_proposal_Rminus1_min: 0.0
    max_samples: 100000
    Rminus1_stop: 0.1
    Rminus1_cl_stop: 0.2
    Rminus1_cl_level: 0.95
    Rminus1_single_split: 4
    measure_speeds: true
    oversample_power: 0.4
    oversample_thin: true
    drag: false
    blocking:
    - - 1
      - - logA
        - n_s
        - H0
        - omega_b
        - omega_cdm
        - tau_reio
        - epsilon_T
    - - 5
      - - A_planck
    callback_function: null
    callback_every: null
    seed: null
    check_every: null
    oversample: null
    drag_limits: null
    fallback_covmat_scale: 4
    version: 3.6.2
output: tep_native
packages_path: data/external/cobaya_packages
version: 3.6.2
