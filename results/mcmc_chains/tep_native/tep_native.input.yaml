theory:
  classy:
    ignore_obsolete: true
    extra_args:
      output: tCl,pCl,lCl
      lensing: 'yes'
      non_linear: none
      l_max_scalars: 2700
      tep_mode: 'yes'
      z_T: 5.0
      n_T: 2.0
likelihood:
  planck_2018_lowl.TT: null
  planck_2018_lowl.EE: null
  planck_2018_lensing.native: null
  bao.sdss_dr12_consensus_final: null
  sn.pantheonplus: null
params:
  logA:
    prior:
      min: 2.5
      max: 3.5
    ref:
      dist: norm
      loc: 3.044
      scale: 0.014
    proposal: 0.01
    drop: true
    latex: \log(10^{10} A_s)
  A_s:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    latex: A_s
  n_s:
    prior:
      min: 0.9
      max: 1.05
    ref:
      dist: norm
      loc: 0.965
      scale: 0.004
    proposal: 0.004
    latex: n_s
  H0:
    prior:
      min: 50
      max: 90
    ref:
      dist: norm
      loc: 67.4
      scale: 0.5
    proposal: 0.5
    latex: H_0
  omega_b:
    prior:
      min: 0.018
      max: 0.026
    ref:
      dist: norm
      loc: 0.02237
      scale: 0.0002
    proposal: 0.0002
    latex: \omega_b
  omega_cdm:
    prior:
      min: 0.1
      max: 0.14
    ref:
      dist: norm
      loc: 0.12
      scale: 0.001
    proposal: 0.001
    latex: \omega_{cdm}
  tau_reio:
    prior:
      min: 0.01
      max: 0.15
    ref:
      dist: norm
      loc: 0.0544
      scale: 0.007
    proposal: 0.005
    latex: \tau_{reio}
  A_planck:
    prior:
      dist: norm
      loc: 1.0
      scale: 0.0025
    ref:
      dist: norm
      loc: 1.0
      scale: 0.002
    proposal: 0.002
    latex: A_{planck}
  epsilon_T:
    prior:
      min: 0.0
      max: 0.02
    ref:
      dist: norm
      loc: 0.002
      scale: 0.002
    proposal: 0.0007
    latex: \epsilon_T
sampler:
  mcmc:
    max_samples: 100000
    Rminus1_stop: 0.1
    Rminus1_cl_stop: 0.2
    learn_proposal: true
    output_every: 60s
output: tep_native
packages_path: data/external/cobaya_packages
