# =============================================================================
# Native TEP background-only Cobaya MCMC configuration (TEP-HC, Paper 18)
# =============================================================================
# CORRECT native-TEP configuration: hi_class with the native `tep_mode`
# background-only Hubble modification and STANDARD GR perturbations.
#
# It deliberately does NOT use `gravity_model: propto_omega` or
# `skip_stability_tests_smg` (the deprecated alpha-table proxy; see Appendix A).
#
# Native transition function (background.c:tep_f_transition), authoritative
# TEP-C0 form (Paper 26, core/cosmology.py:f_T):
#     f_T(z) = ln(1+z) * exp(-(z/z_T)^n_T)
# which freezes (-> 0) for z >> z_T, preserving r_s, BBN and the CMB peaks.
#
# Run with the rebuilt local classy on PYTHONPATH:
#   export PYTHONPATH=external/hi_class/hi_class/python:$PYTHONPATH
#   cobaya-run -f -p data/external/cobaya_packages data/cobaya/tep_native_mcmc.yaml
#
# Likelihoods: Planck 2018 low-l TT/EE (native) + lensing + BAO (SDSS DR12)
# + Pantheon+ SNe. High-l plik is omitted here because the bundled clipy
# high-l interface returns NaN with this CLASS build (a pre-existing issue
# independent of TEP); n_s is therefore only weakly constrained in this run.
# -----------------------------------------------------------------------------

theory:
  classy:
    # No `path:` -- classy is imported from PYTHONPATH (the locally rebuilt
    # hi_class wrapper at external/hi_class/hi_class/python).
    ignore_obsolete: true
    extra_args:
      output: tCl,pCl,lCl,mPk
      lensing: 'yes'
      modes: s,t
      non_linear: halofit
      l_max_scalars: 2700
      # --- Native TEP background-only modification (NO SMG / NO propto_omega) ---
      tep_mode: 'yes'
      z_T: 5.0
      n_T: 2.0

likelihood:
  planck_2018_lowl.TT: null
  planck_2018_lowl.EE: null
  planck_2018_lensing.native: null
  bao.sdss_dr12_consensus_final: null
  sn.pantheonplus: null

params:
  logA:
    prior: {min: 2.5, max: 3.5}
    ref: {dist: norm, loc: 3.044, scale: 0.014}
    proposal: 0.01
    drop: true
    latex: '\log(10^{10} A_s)'
  A_s:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    latex: 'A_s'
  n_s:
    prior: {min: 0.9, max: 1.05}
    ref: {dist: norm, loc: 0.965, scale: 0.004}
    proposal: 0.004
    latex: 'n_s'
  H0:
    prior: {min: 50, max: 90}
    ref: {dist: norm, loc: 67.4, scale: 0.5}
    proposal: 0.5
    latex: 'H_0'
  omega_b:
    prior: {min: 0.018, max: 0.026}
    ref: {dist: norm, loc: 0.02237, scale: 0.0002}
    proposal: 0.0002
    latex: '\omega_b'
  omega_cdm:
    prior: {min: 0.10, max: 0.14}
    ref: {dist: norm, loc: 0.1200, scale: 0.001}
    proposal: 0.001
    latex: '\omega_{cdm}'
  tau_reio:
    prior: {min: 0.01, max: 0.15}
    ref: {dist: norm, loc: 0.0544, scale: 0.007}
    proposal: 0.005
    latex: '\tau_{reio}'
  A_planck:
    prior: {dist: norm, loc: 1.0, scale: 0.0025}
    ref: {dist: norm, loc: 1.0, scale: 0.002}
    proposal: 0.002
    latex: 'A_{planck}'
  epsilon_T:
    prior: {min: -1.0, max: 1.0}
    ref: {dist: norm, loc: 0.006, scale: 0.005}
    proposal: 0.0005
    latex: '\epsilon_T'
  sigma8:
    latex: '\sigma_8'

sampler:
  mcmc:
    burn_in: 0
    max_tries: 10000
    max_samples: 500000
    Rminus1_stop: 0.05
    Rminus1_cl_stop: 0.2
    output_every: 10
    learn_proposal: true
    learn_proposal_Rminus1_max_early: 100.0
    fallback_covmat_scale: 3
    drag: true
    seed: 42

output: results/mcmc_chains/tep_native/tep_native
